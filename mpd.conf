music_directory     "/music"
db_file             "/var/lib/mpd/tag_cache"
log_file            "/var/log/mpd/mpd.log"
pid_file            "/run/mpd/pid"
state_file          "/var/lib/mpd/state"
bind_to_address     "127.0.0.1"

audio_output {
    type            "httpd"
    name            "HTTP Stream"
    encoder         "lame"
    port            "8000"
    bind_to_address "0.0.0.0"
    bitrate         "128"
    format          "44100:16:2"
    max_clients     "0"
}
